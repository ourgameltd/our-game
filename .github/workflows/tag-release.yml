name: Deploy on Tag Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: 'rgourgame'
  AZURE_REGION: 'westeurope'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Publish API
      working-directory: ./api
      run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output
      
    - name: List published files
      run: ls -la ./api-output
      
    - name: Upload API artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: api-package
        path: ./api-output

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      working-directory: ./web
      run: npm ci
      
    - name: Build frontend
      working-directory: ./web
      run: npm run build
      
    - name: Upload frontend artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: frontend-package
        path: ./web/dist

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: live
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
      staticWebAppUrl: ${{ steps.deploy.outputs.staticWebAppUrl }}
      storageAccountName: ${{ steps.deploy.outputs.storageAccountName }}
      sqlServerName: ${{ steps.deploy.outputs.sqlServerName }}
      sqlServerFqdn: ${{ steps.deploy.outputs.sqlServerFqdn }}
      sqlAdminUsername: ${{ steps.deploy.outputs.sqlAdminUsername }}
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Resolve SQL admin username
      id: sql_admin
      shell: bash
      run: |
        SQL_ADMIN_USERNAME="${{ vars.SQL_ADMIN_USERNAME }}"

        # Use a safe default if repository variable is not configured.
        if [ -z "$SQL_ADMIN_USERNAME" ]; then
          SQL_ADMIN_USERNAME="ourgame_sql_admin"
        fi

        # Enforce a conservative, Azure SQL-compatible login format.
        if [[ ! "$SQL_ADMIN_USERNAME" =~ ^[A-Za-z][A-Za-z0-9_]{2,127}$ ]]; then
          echo "Invalid SQL admin username: '$SQL_ADMIN_USERNAME'"
          echo "Expected pattern: starts with a letter, then letters/numbers/underscore, length 3-128"
          exit 1
        fi

        echo "sqlAdminUsername=$SQL_ADMIN_USERNAME" >> $GITHUB_OUTPUT

    - name: Validate SQL admin password secret
      shell: bash
      run: |
        if [ -z "${{ secrets.SQL_ADMIN_PASSWORD }}" ]; then
          echo "GitHub secret SQL_ADMIN_PASSWORD is required and must not be empty"
          exit 1
        fi
        
    - name: Deploy Bicep template at subscription level
      id: deploy
      run: |
        LOCATION="${{ env.AZURE_REGION }}"
        RESOURCE_GROUP="${{ env.AZURE_RESOURCE_GROUP }}"
        
        DEPLOYMENT_OUTPUT=$(az deployment sub create \
          --location "$LOCATION" \
          --template-file infrastructure/main-subscription.bicep \
          --parameters resourceGroupName="$RESOURCE_GROUP" \
          --parameters location="$LOCATION" \
          --parameters environmentName=prod \
          --parameters baseName=ourgame \
          --parameters storageAccountSku=Standard_LRS \
          --parameters sqlAdminUsername="${{ steps.sql_admin.outputs.sqlAdminUsername }}" \
          --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
          --query 'properties.outputs' \
          --output json)
        
        echo "resourceGroupName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.resourceGroupName.value')" >> $GITHUB_OUTPUT
        echo "staticWebAppName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.staticWebAppName.value')" >> $GITHUB_OUTPUT
        echo "staticWebAppUrl=$(echo $DEPLOYMENT_OUTPUT | jq -r '.staticWebAppUrl.value')" >> $GITHUB_OUTPUT
        echo "functionAppName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.functionAppName.value')" >> $GITHUB_OUTPUT
        echo "storageAccountName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT
        echo "sqlServerName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.sqlServerName.value')" >> $GITHUB_OUTPUT
        echo "sqlServerFqdn=$(echo $DEPLOYMENT_OUTPUT | jq -r '.sqlServerFqdn.value')" >> $GITHUB_OUTPUT
        echo "sqlAdminUsername=$(echo $DEPLOYMENT_OUTPUT | jq -r '.sqlAdminUsername.value')" >> $GITHUB_OUTPUT

  provision-database:
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    environment: live
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Add runner IP to SQL Server firewall
      id: firewall
      run: |
        RUNNER_IP=$(curl -s https://api.ipify.org)
        echo "runnerIp=$RUNNER_IP" >> $GITHUB_OUTPUT
        az sql server firewall-rule create \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --server ${{ needs.deploy-infrastructure.outputs.sqlServerName }} \
          --name GitHubActionsRunner \
          --start-ip-address "$RUNNER_IP" \
          --end-ip-address "$RUNNER_IP"

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Run database seeder (migrations + seed data)
      run: |
        SQL_SERVER="${{ needs.deploy-infrastructure.outputs.sqlServerFqdn }}"
        SQL_ADMIN_USERNAME="${{ needs.deploy-infrastructure.outputs.sqlAdminUsername }}"
        export ConnectionStrings__DefaultConnection="Server=tcp:${SQL_SERVER},1433;Database=OurGame;User ID=${SQL_ADMIN_USERNAME};Password=${{ secrets.SQL_ADMIN_PASSWORD }};Encrypt=True;TrustServerCertificate=False;"
        dotnet run --project api/OurGame.Seeder

    - name: Remove runner IP from SQL Server firewall
      if: always()
      run: |
        az sql server firewall-rule delete \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --server ${{ needs.deploy-infrastructure.outputs.sqlServerName }} \
          --name GitHubActionsRunner \
          --yes 2>/dev/null || true

  deploy-function-app:
    runs-on: ubuntu-latest
    needs: [build-backend, deploy-infrastructure, provision-database]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Publish API
      working-directory: ./api
      run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output

    - name: Deploy to Azure Function App
      uses: Azure/functions-action@ac2abfb0e49d12ed5d273a3cb39f01bdd1654c43 # v1.5.5
      with:
        app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
        package: ./api-output

  deploy-static-web-app:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-infrastructure, deploy-function-app]
    environment: live
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Download frontend artifact
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: frontend-package
        path: ./frontend-dist
        
    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Get Static Web App deployment token
      id: static_web_app_token
      run: |
        TOKEN=$(az staticwebapp secrets list \
          --name ${{ needs.deploy-infrastructure.outputs.staticWebAppName }} \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT
        
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./frontend-dist"
        output_location: "."
        skip_app_build: true

    - name: Configure Static Web App authentication settings
      run: |
        az staticwebapp appsettings set \
          --name ${{ needs.deploy-infrastructure.outputs.staticWebAppName }} \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --setting-names \
            B2C_CLIENT_ID="$B2C_CLIENT_ID" \
            B2C_CLIENT_SECRET="$B2C_CLIENT_SECRET"
      env:
        B2C_CLIENT_ID: ${{ vars.B2C_CLIENT_ID }}
        B2C_CLIENT_SECRET: ${{ secrets.B2C_CLIENT_SECRET }}
          
    - name: Deployment Summary
      run: |
        echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Group**: ${{ needs.deploy-infrastructure.outputs.resourceGroupName }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Static Web App URL**: ${{ needs.deploy-infrastructure.outputs.staticWebAppUrl }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Function App**: ${{ needs.deploy-infrastructure.outputs.functionAppName }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Architecture" >> $GITHUB_STEP_SUMMARY
        echo "Using Azure Static Web Apps (Standard) with linked Azure Function App" >> $GITHUB_STEP_SUMMARY
