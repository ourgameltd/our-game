name: Deploy on Tag Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: 'rgourgame'
  AZURE_REGION: 'westeurope'

jobs:
  build-backend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Publish API
      working-directory: ./api
      run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output
      
    - name: List published files
      run: ls -la ./api-output
      
    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-package
        path: ./api-output

  build-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      working-directory: ./web
      run: npm ci
      
    - name: Build frontend
      working-directory: ./web
      run: npm run build
      
    - name: Upload frontend artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-package
        path: ./web/dist

  deploy-infrastructure:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
      staticWebAppUrl: ${{ steps.deploy.outputs.staticWebAppUrl }}
      storageAccountName: ${{ steps.deploy.outputs.storageAccountName }}
      sqlServerName: ${{ steps.deploy.outputs.sqlServerName }}
      sqlServerFqdn: ${{ steps.deploy.outputs.sqlServerFqdn }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Resolve service principal details for SQL admin
      id: sp
      run: |
        CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')
        TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.tenantId')
        SP_OBJECT_ID=$(az ad sp show --id "$CLIENT_ID" --query id -o tsv)
        SP_DISPLAY_NAME=$(az ad sp show --id "$CLIENT_ID" --query displayName -o tsv)
        echo "objectId=$SP_OBJECT_ID" >> $GITHUB_OUTPUT
        echo "displayName=$SP_DISPLAY_NAME" >> $GITHUB_OUTPUT
        echo "tenantId=$TENANT_ID" >> $GITHUB_OUTPUT
        
    - name: Deploy Bicep template at subscription level
      id: deploy
      run: |
        LOCATION="${{ env.AZURE_REGION }}"
        RESOURCE_GROUP="${{ env.AZURE_RESOURCE_GROUP }}"
        
        DEPLOYMENT_OUTPUT=$(az deployment sub create \
          --location "$LOCATION" \
          --template-file infrastructure/main-subscription.bicep \
          --parameters resourceGroupName="$RESOURCE_GROUP" \
          --parameters location="$LOCATION" \
          --parameters environmentName=prod \
          --parameters baseName=ourgame \
          --parameters storageAccountSku=Standard_LRS \
          --parameters sqlAdminObjectId="${{ steps.sp.outputs.objectId }}" \
          --parameters sqlAdminLoginName="${{ steps.sp.outputs.displayName }}" \
          --parameters sqlAdminTenantId="${{ steps.sp.outputs.tenantId }}" \
          --query 'properties.outputs' \
          --output json)
        
        echo "resourceGroupName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.resourceGroupName.value')" >> $GITHUB_OUTPUT
        echo "staticWebAppName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.staticWebAppName.value')" >> $GITHUB_OUTPUT
        echo "staticWebAppUrl=$(echo $DEPLOYMENT_OUTPUT | jq -r '.staticWebAppUrl.value')" >> $GITHUB_OUTPUT
        echo "functionAppName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.functionAppName.value')" >> $GITHUB_OUTPUT
        echo "storageAccountName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT
        echo "sqlServerName=$(echo $DEPLOYMENT_OUTPUT | jq -r '.sqlServerName.value')" >> $GITHUB_OUTPUT
        echo "sqlServerFqdn=$(echo $DEPLOYMENT_OUTPUT | jq -r '.sqlServerFqdn.value')" >> $GITHUB_OUTPUT

  provision-database:
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Add runner IP to SQL Server firewall
      id: firewall
      run: |
        RUNNER_IP=$(curl -s https://api.ipify.org)
        echo "runnerIp=$RUNNER_IP" >> $GITHUB_OUTPUT
        az sql server firewall-rule create \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --server ${{ needs.deploy-infrastructure.outputs.sqlServerName }} \
          --name GitHubActionsRunner \
          --start-ip-address "$RUNNER_IP" \
          --end-ip-address "$RUNNER_IP"

    - name: Install sqlcmd (go-sqlcmd)
      run: |
        curl -sSL https://github.com/microsoft/go-sqlcmd/releases/latest/download/sqlcmd-linux-amd64.tar.bz2 | tar xj -C /tmp
        sudo install -m 755 /tmp/sqlcmd /usr/local/bin/sqlcmd
        sqlcmd --version

    - name: Create SQL contained user for Function App managed identity
      run: |
        FUNC_APP_NAME="${{ needs.deploy-infrastructure.outputs.functionAppName }}"
        SQL_SERVER="${{ needs.deploy-infrastructure.outputs.sqlServerFqdn }}"
        
        # Get an access token for SQL using the logged-in service principal
        TOKEN=$(az account get-access-token --resource https://database.windows.net/ --query accessToken -o tsv)
        
        # Create the contained user and grant roles using sqlcmd
        sqlcmd -S "tcp:${SQL_SERVER},1433" -d OurGame --authentication-method=ActiveDirectoryAccessToken --access-token "$TOKEN" -Q "
          IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = '${FUNC_APP_NAME}')
          BEGIN
            CREATE USER [${FUNC_APP_NAME}] FROM EXTERNAL PROVIDER;
            ALTER ROLE db_datareader ADD MEMBER [${FUNC_APP_NAME}];
            ALTER ROLE db_datawriter ADD MEMBER [${FUNC_APP_NAME}];
            ALTER ROLE db_ddladmin ADD MEMBER [${FUNC_APP_NAME}];
          END
        "
        echo "✅ SQL user [${FUNC_APP_NAME}] provisioned with datareader, datawriter, and ddladmin roles"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Run database seeder (migrations + seed data)
      run: |
        SQL_SERVER="${{ needs.deploy-infrastructure.outputs.sqlServerFqdn }}"
        export ConnectionStrings__DefaultConnection="Server=tcp:${SQL_SERVER},1433;Database=OurGame;Authentication=Active Directory Default;Encrypt=True;TrustServerCertificate=False;"
        dotnet run --project api/OurGame.Seeder

    - name: Remove runner IP from SQL Server firewall
      if: always()
      run: |
        az sql server firewall-rule delete \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --server ${{ needs.deploy-infrastructure.outputs.sqlServerName }} \
          --name GitHubActionsRunner \
          --yes 2>/dev/null || true

  deploy-function-app:
    runs-on: ubuntu-latest
    needs: [build-backend, deploy-infrastructure, provision-database]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
        
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Publish API
      working-directory: ./api
      run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output

    - name: Deploy to Azure Function App
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
        package: ./api-output

  deploy-static-web-app:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-infrastructure, deploy-function-app]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-package
        path: ./frontend-dist
        
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
        
    - name: Get Static Web App deployment token
      id: static_web_app_token
      run: |
        TOKEN=$(az staticwebapp secrets list \
          --name ${{ needs.deploy-infrastructure.outputs.staticWebAppName }} \
          --resource-group ${{ needs.deploy-infrastructure.outputs.resourceGroupName }} \
          --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT
        
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./frontend-dist"
        output_location: "."
        skip_app_build: true
          
    - name: Deployment Summary
      run: |
        echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tag**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Group**: ${{ needs.deploy-infrastructure.outputs.resourceGroupName }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Static Web App URL**: ${{ needs.deploy-infrastructure.outputs.staticWebAppUrl }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Function App**: ${{ needs.deploy-infrastructure.outputs.functionAppName }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Architecture" >> $GITHUB_STEP_SUMMARY
        echo "Using Azure Static Web Apps (Standard) with linked Azure Function App" >> $GITHUB_STEP_SUMMARY
