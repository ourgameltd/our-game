name: "PR: Build, Test & Preview"

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  pull-requests: write
  deployments: write
  statuses: write

concurrency:
  # Per-PR group; do NOT cancel in-progress so close-preview always runs to
  # completion even if a new push lands at the same time.
  group: pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  AZURE_REGION: 'westeurope'
  AZURE_RESOURCE_GROUP: 'rgourgame'
  STATIC_WEB_APP_NAME: 'ourgame-swa-prod'
  B2C_PROVIDER_NAME: 'btoc'

jobs:
  # ---------------------------------------------------------------------------
  # Detect which functional paths a PR touched. Only functional, non-Dependabot,
  # non-fork PRs trigger a preview deploy; everything else only validates.
  # ---------------------------------------------------------------------------
  changes:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      functional: ${{ steps.filter.outputs.functional }}
      isDependabot: ${{ steps.filter.outputs.isDependabot }}
      isFork: ${{ steps.filter.outputs.isFork }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Detect changed paths and PR origin
        id: filter
        shell: bash
        env:
          ACTOR: ${{ github.actor }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ "$ACTOR" = "dependabot[bot]" ]; then
            IS_DEPENDABOT=true
          else
            IS_DEPENDABOT=false
          fi

          if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            IS_FORK=true
          else
            IS_FORK=false
          fi

          INFRA=false
          API=false
          WEB=false

          if [ -n "${BASE_SHA:-}" ] && [ -n "${HEAD_SHA:-}" ]; then
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)
          else
            CHANGED=""
          fi

          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^infrastructure/'; then
            INFRA=true
          fi

          if echo "$CHANGED" | grep -qE '^api/'; then
            API=true
          fi

          if echo "$CHANGED" | grep -qE '^web/'; then
            WEB=true
          fi

          FUNCTIONAL=false
          if [ "$INFRA" = "true" ] || [ "$API" = "true" ] || [ "$WEB" = "true" ]; then
            FUNCTIONAL=true
          fi

          {
            echo "infra=$INFRA"
            echo "api=$API"
            echo "web=$WEB"
            echo "functional=$FUNCTIONAL"
            echo "isDependabot=$IS_DEPENDABOT"
            echo "isFork=$IS_FORK"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## PR Change Detection"
            echo ""
            echo "- Functional change: \`$FUNCTIONAL\` (infra=\`$INFRA\`, api=\`$API\`, web=\`$WEB\`)"
            echo "- Dependabot PR: \`$IS_DEPENDABOT\`"
            echo "- Fork PR: \`$IS_FORK\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Always-on validation: build, test, coverage, publish artifacts.
  # ---------------------------------------------------------------------------
  build:
    if: github.event.action != 'closed'
    needs: changes
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
        ports:
          - 14330:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore dependencies
        working-directory: ./api
        run: dotnet restore

      - name: Build solution
        working-directory: ./api
        run: dotnet build --configuration Release --no-restore

      - name: Run tests with coverage
        working-directory: ./api
        run: |
          dotnet test --configuration Release --no-build --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@cf6fe1b38ed5becc89ffe056c1f240825993be5b # 5.5.4
        with:
          reports: './api/TestResults/**/coverage.cobertura.xml'
          targetdir: './coverage-report'
          reporttypes: 'HtmlInline_AzurePipelines;MarkdownSummaryGithub;Cobertura'
          assemblyfilters: '-OurGame.Persistence'

      - name: Add coverage summary to build
        run: |
          echo "## Unit Test Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat ./coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: coverage-report
          path: ./coverage-report
          retention-days: 14

      - name: Publish API
        working-directory: ./api
        run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output

      - name: Upload API artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: api-package
          path: ./api-output
          retention-days: 7

      - name: Install React dependencies
        working-directory: ./web
        run: npm ci

      - name: Build React frontend
        working-directory: ./web
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-package
          path: ./web/dist
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Conditional full-stack deploy for functional PRs into the shared environment.
  # This updates infra, database, and API together before publishing the SWA PR
  # preview environment.
  # ---------------------------------------------------------------------------
  deploy-infrastructure:
    if: |
      github.event.action != 'closed' &&
      needs.changes.outputs.functional == 'true' &&
      needs.changes.outputs.isDependabot != 'true' &&
      needs.changes.outputs.isFork != 'true'
    needs: [changes, build]
    runs-on: ubuntu-latest
    environment: live
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
      staticWebAppUrl: ${{ steps.deploy.outputs.staticWebAppUrl }}
      sqlServerName: ${{ steps.deploy.outputs.sqlServerName }}
      sqlServerFqdn: ${{ steps.deploy.outputs.sqlServerFqdn }}
      sqlAdminUsername: ${{ steps.deploy.outputs.sqlAdminUsername }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve SQL admin username
        id: sql_admin
        shell: bash
        run: |
          SQL_ADMIN_USERNAME="${{ vars.SQL_ADMIN_USERNAME }}"

          if [ -z "$SQL_ADMIN_USERNAME" ]; then
            SQL_ADMIN_USERNAME="ourgame_sql_admin"
          fi

          if [[ ! "$SQL_ADMIN_USERNAME" =~ ^[A-Za-z][A-Za-z0-9_]{2,127}$ ]]; then
            echo "Invalid SQL admin username: '$SQL_ADMIN_USERNAME'"
            echo "Expected pattern: starts with a letter, then letters/numbers/underscore, length 3-128"
            exit 1
          fi

          echo "sqlAdminUsername=$SQL_ADMIN_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Validate SQL admin password secret
        shell: bash
        run: |
          if [ -z "${{ secrets.SQL_ADMIN_PASSWORD }}" ]; then
            echo "GitHub secret SQL_ADMIN_PASSWORD is required and must not be empty"
            exit 1
          fi

      - name: Resolve VAPID deployment parameters
        id: deploy_params
        shell: bash
        run: |
          VAPID_SUBJECT="${{ vars.VAPID_SUBJECT }}"
          VAPID_PUBLIC_KEY="${{ vars.VAPID_PUBLIC_KEY }}"

          echo "vapidSubject=$VAPID_SUBJECT" >> "$GITHUB_OUTPUT"
          echo "vapidPublicKey=$VAPID_PUBLIC_KEY" >> "$GITHUB_OUTPUT"

      - name: Deploy Bicep template at subscription level
        id: deploy
        shell: bash
        run: |
          LOCATION="${{ env.AZURE_REGION }}"
          RESOURCE_GROUP="${{ env.AZURE_RESOURCE_GROUP }}"

          DEPLOYMENT_OUTPUT=$(az deployment sub create \
            --location "$LOCATION" \
            --template-file infrastructure/main-subscription.bicep \
            --parameters resourceGroupName="$RESOURCE_GROUP" \
            --parameters location="$LOCATION" \
            --parameters environmentName=prod \
            --parameters baseName=ourgame \
            --parameters storageAccountSku=Standard_LRS \
            --parameters sqlAdminUsername="${{ steps.sql_admin.outputs.sqlAdminUsername }}" \
            --parameters sqlAdminPassword="${{ secrets.SQL_ADMIN_PASSWORD }}" \
            --parameters vapidSubject="${{ steps.deploy_params.outputs.vapidSubject }}" \
            --parameters vapidPublicKey="${{ steps.deploy_params.outputs.vapidPublicKey }}" \
            --parameters vapidPrivateKey="${{ secrets.VAPID_PRIVATE_KEY }}" \
            --query 'properties.outputs' \
            --output json)

          echo "resourceGroupName=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.resourceGroupName.value')" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.staticWebAppName.value')" >> "$GITHUB_OUTPUT"
          echo "staticWebAppUrl=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.staticWebAppUrl.value')" >> "$GITHUB_OUTPUT"
          echo "functionAppName=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.functionAppName.value')" >> "$GITHUB_OUTPUT"
          echo "sqlServerName=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.sqlServerName.value')" >> "$GITHUB_OUTPUT"
          echo "sqlServerFqdn=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.sqlServerFqdn.value')" >> "$GITHUB_OUTPUT"
          echo "sqlAdminUsername=$(echo "$DEPLOYMENT_OUTPUT" | jq -r '.sqlAdminUsername.value')" >> "$GITHUB_OUTPUT"

  deploy-database:
    if: |
      github.event.action != 'closed' &&
      needs.changes.outputs.functional == 'true' &&
      needs.changes.outputs.isDependabot != 'true' &&
      needs.changes.outputs.isFork != 'true'
    needs: [changes, deploy-infrastructure]
    runs-on: ubuntu-latest
    environment: live

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Add runner IP to SQL Server firewall
        shell: bash
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          az sql server firewall-rule create \
            --resource-group "${{ needs.deploy-infrastructure.outputs.resourceGroupName }}" \
            --server "${{ needs.deploy-infrastructure.outputs.sqlServerName }}" \
            --name GitHubActionsRunner \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run database seeder (migrations + seed data)
        shell: bash
        run: |
          SQL_SERVER="${{ needs.deploy-infrastructure.outputs.sqlServerFqdn }}"
          SQL_ADMIN_USERNAME="${{ needs.deploy-infrastructure.outputs.sqlAdminUsername }}"
          export ConnectionStrings__DefaultConnection="Server=tcp:${SQL_SERVER},1433;Database=OurGame;User ID=${SQL_ADMIN_USERNAME};Password=${{ secrets.SQL_ADMIN_PASSWORD }};Encrypt=True;TrustServerCertificate=False;"
          dotnet run --project api/OurGame.Seeder

      - name: Remove runner IP from SQL Server firewall
        if: always()
        shell: bash
        run: |
          az sql server firewall-rule delete \
            --resource-group "${{ needs.deploy-infrastructure.outputs.resourceGroupName }}" \
            --server "${{ needs.deploy-infrastructure.outputs.sqlServerName }}" \
            --name GitHubActionsRunner \
            --yes 2>/dev/null || true

  deploy-function-app:
    if: |
      github.event.action != 'closed' &&
      needs.changes.outputs.functional == 'true' &&
      needs.changes.outputs.isDependabot != 'true' &&
      needs.changes.outputs.isFork != 'true'
    needs: [changes, build, deploy-infrastructure, deploy-database]
    runs-on: ubuntu-latest
    environment: live

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-package
          path: ./api-output

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@ac2abfb0e49d12ed5d273a3cb39f01bdd1654c43 # v1.5.5
        with:
          app-name: ${{ needs.deploy-infrastructure.outputs.functionAppName }}
          package: ./api-output

  # ---------------------------------------------------------------------------
  # Conditional preview deploy using Azure Static Web Apps native PR preview
  # environments. This runs after infra/database/API deployment so each PR
  # preview reflects the complete shared-environment stack updates.
  # ---------------------------------------------------------------------------
  deploy-preview:
    if: |
      github.event.action != 'closed' &&
      needs.changes.outputs.functional == 'true' &&
      needs.changes.outputs.isDependabot != 'true' &&
      needs.changes.outputs.isFork != 'true'
    needs: [changes, build, deploy-infrastructure, deploy-database, deploy-function-app]
    runs-on: ubuntu-latest
    environment:
      name: live
      url: ${{ steps.deploy_preview.outputs.static_web_app_url }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download frontend artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-package
          path: ./web/dist

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Static Web App deployment token
        id: static_web_app_token
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ needs.deploy-infrastructure.outputs.staticWebAppName }}" \
            --resource-group "${{ needs.deploy-infrastructure.outputs.resourceGroupName }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy PR preview environment to Azure Static Web Apps
        id: deploy_preview
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./web/dist"
          output_location: "."
          skip_app_build: true

      - name: Azure Login (B2C tenant)
        shell: bash
        env:
          B2C_CREDENTIALS: ${{ secrets.B2C_CREDENTIALS }}
        run: |
          if [ -z "$B2C_CREDENTIALS" ]; then
            echo "::warning::B2C_CREDENTIALS is empty; skipping B2C login and callback URI update."
            exit 0
          fi

          B2C_CLIENT_ID=$(echo "$B2C_CREDENTIALS" | jq -r '.clientId // empty')
          B2C_CLIENT_SECRET=$(echo "$B2C_CREDENTIALS" | jq -r '.clientSecret // empty')
          B2C_TENANT_ID=$(echo "$B2C_CREDENTIALS" | jq -r '.tenantId // empty')

          if [ -z "$B2C_CLIENT_ID" ] || [ -z "$B2C_CLIENT_SECRET" ] || [ -z "$B2C_TENANT_ID" ]; then
            echo "::warning::B2C_CREDENTIALS must include clientId, clientSecret, and tenantId."
            exit 0
          fi

          az account clear || true
          az logout || true

          az login \
            --service-principal \
            --username "$B2C_CLIENT_ID" \
            --password "$B2C_CLIENT_SECRET" \
            --tenant "$B2C_TENANT_ID" \
            --allow-no-subscriptions 1>/dev/null

          ACTIVE_TENANT=$(az account show --query tenantId -o tsv 2>/dev/null || echo "")
          if [ "$ACTIVE_TENANT" != "$B2C_TENANT_ID" ]; then
            echo "::warning::B2C login succeeded but active tenant '$ACTIVE_TENANT' does not match expected '$B2C_TENANT_ID'."
            exit 0
          fi

      - name: Add preview callback URI to B2C app registration
        shell: bash
        env:
          APP_ID: ${{ vars.B2C_CLIENT_ID }}
          PREVIEW_BASE_URL: ${{ steps.deploy_preview.outputs.static_web_app_url }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Repository variable B2C_CLIENT_ID is required."
            exit 1
          fi

          if [ -z "$PREVIEW_BASE_URL" ]; then
            PREVIEW_HOSTNAME=$(az staticwebapp environment list \
              --name "${{ needs.deploy-infrastructure.outputs.staticWebAppName }}" \
              --resource-group "${{ needs.deploy-infrastructure.outputs.resourceGroupName }}" \
              --query "[?contains(name, '${HEAD_REF}') || contains(hostname, '-${PR_NUMBER}.')].hostname | [0]" \
              -o tsv)

            if [ -n "$PREVIEW_HOSTNAME" ]; then
              PREVIEW_BASE_URL="https://${PREVIEW_HOSTNAME}"
            fi
          fi

          if [ -z "$PREVIEW_BASE_URL" ]; then
            echo "Unable to resolve preview URL; cannot update redirect URIs."
            exit 1
          fi

          CALLBACK_URI="${PREVIEW_BASE_URL}/.auth/login/${{ env.B2C_PROVIDER_NAME }}/callback"
          echo "Using callback URI: $CALLBACK_URI"

          ACTIVE_TENANT=$(az account show --query tenantId -o tsv 2>/dev/null || echo "unknown")
          SIGNED_IN_IDENTITY=$(az account show --query user.name -o tsv 2>/dev/null || echo "unknown")

          set +e
          APP_OBJECT_ID=$(az ad app show --id "$APP_ID" --query "id" -o tsv 2>&1)
          SHOW_LOOKUP_EXIT_CODE=$?
          set -e

          if [ $SHOW_LOOKUP_EXIT_CODE -ne 0 ] || [ -z "$APP_OBJECT_ID" ] || [ "$APP_OBJECT_ID" = "null" ]; then
            set +e
            APP_OBJECT_ID=$(az ad app list --filter "appId eq '$APP_ID'" --query "[0].id" -o tsv 2>&1)
            APP_LOOKUP_EXIT_CODE=$?
            set -e
          else
            APP_LOOKUP_EXIT_CODE=0
          fi

          if [ $APP_LOOKUP_EXIT_CODE -ne 0 ] || [ -z "$APP_OBJECT_ID" ] || [ "$APP_OBJECT_ID" = "null" ]; then
            echo "::warning::Unable to resolve app registration for appId '$APP_ID' in tenant '$ACTIVE_TENANT'. Signed-in identity: '$SIGNED_IN_IDENTITY'. Output: $APP_OBJECT_ID"
            {
              echo "## PR Preview Environment"
              echo ""
              echo "- PR: #${PR_NUMBER}"
              echo "- Preview URL: ${PREVIEW_BASE_URL}"
              echo "- Callback URI update skipped because the app registration could not be resolved in tenant ${ACTIVE_TENANT}."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          set +e
          CURRENT_URIS_JSON=$(az ad app show --id "$APP_OBJECT_ID" --query "web.redirectUris" -o json 2>&1)
          SHOW_EXIT_CODE=$?
          set -e
          if [ $SHOW_EXIT_CODE -ne 0 ]; then
            echo "::warning::Unable to read app registration redirect URIs. Grant Application.ReadWrite.All (admin consent). Output: $CURRENT_URIS_JSON"
            exit 0
          fi

          mapfile -t CURRENT_URIS < <(echo "$CURRENT_URIS_JSON" | jq -r '.[]?')
          CURRENT_URIS+=("$CALLBACK_URI")
          mapfile -t UNIQUE_URIS < <(printf "%s\n" "${CURRENT_URIS[@]}" | awk 'NF && !seen[$0]++')

          set +e
          UPDATE_OUTPUT=$(az ad app update --id "$APP_OBJECT_ID" --web-redirect-uris "${UNIQUE_URIS[@]}" 2>&1)
          UPDATE_EXIT_CODE=$?
          set -e
          if [ $UPDATE_EXIT_CODE -ne 0 ]; then
            echo "::warning::Unable to update app registration redirect URIs. Output: $UPDATE_OUTPUT"
            exit 0
          fi

          {
            echo "## PR Preview Environment"
            echo ""
            echo "- PR: #${PR_NUMBER}"
            echo "- Static Web App: ${{ needs.deploy-infrastructure.outputs.staticWebAppName }}"
            echo "- Preview URL: ${PREVIEW_BASE_URL}"
            echo "- Added callback URI: ${CALLBACK_URI}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Always-on close cleanup. Closes the SWA preview environment for the PR and
  # removes the matching B2C redirect URI. Runs on every PR close regardless of
  # changed paths or actor (so Dependabot/closes without a deploy still tidy).
  # ---------------------------------------------------------------------------
  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment:
      name: live
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Static Web App deployment token
        id: static_web_app_token
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "${{ env.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Resolve current preview callback URI
        id: preview_uri
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          PREVIEW_HOSTNAME=$(az staticwebapp environment list \
            --name "${{ env.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[?contains(name, '${HEAD_REF}') || contains(hostname, '-${PR_NUMBER}.')].hostname | [0]" \
            -o tsv)

          if [ -n "$PREVIEW_HOSTNAME" ]; then
            echo "callbackUri=https://${PREVIEW_HOSTNAME}/.auth/login/${{ env.B2C_PROVIDER_NAME }}/callback" >> "$GITHUB_OUTPUT"
            echo "previewUrl=https://${PREVIEW_HOSTNAME}" >> "$GITHUB_OUTPUT"
          else
            echo "No preview environment hostname found for PR #${PR_NUMBER}; nothing to clean up."
          fi

      - name: Close PR preview environment
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "close"

      - name: Azure Login (B2C tenant)
        if: steps.preview_uri.outputs.callbackUri != ''
        shell: bash
        env:
          B2C_CREDENTIALS: ${{ secrets.B2C_CREDENTIALS }}
        run: |
          if [ -z "$B2C_CREDENTIALS" ]; then
            echo "::warning::B2C_CREDENTIALS is empty; skipping B2C login and callback URI cleanup."
            exit 0
          fi

          B2C_CLIENT_ID=$(echo "$B2C_CREDENTIALS" | jq -r '.clientId // empty')
          B2C_CLIENT_SECRET=$(echo "$B2C_CREDENTIALS" | jq -r '.clientSecret // empty')
          B2C_TENANT_ID=$(echo "$B2C_CREDENTIALS" | jq -r '.tenantId // empty')

          if [ -z "$B2C_CLIENT_ID" ] || [ -z "$B2C_CLIENT_SECRET" ] || [ -z "$B2C_TENANT_ID" ]; then
            echo "::warning::B2C_CREDENTIALS must include clientId, clientSecret, and tenantId."
            exit 0
          fi

          az account clear || true
          az logout || true

          az login \
            --service-principal \
            --username "$B2C_CLIENT_ID" \
            --password "$B2C_CLIENT_SECRET" \
            --tenant "$B2C_TENANT_ID" \
            --allow-no-subscriptions 1>/dev/null

      - name: Remove preview callback URI from B2C app registration
        if: steps.preview_uri.outputs.callbackUri != ''
        shell: bash
        env:
          APP_ID: ${{ vars.B2C_CLIENT_ID }}
          CALLBACK_URI_TO_REMOVE: ${{ steps.preview_uri.outputs.callbackUri }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "Repository variable B2C_CLIENT_ID is required."
            exit 1
          fi

          set +e
          APP_OBJECT_ID=$(az ad app show --id "$APP_ID" --query "id" -o tsv 2>&1)
          SHOW_LOOKUP_EXIT_CODE=$?
          set -e

          if [ $SHOW_LOOKUP_EXIT_CODE -ne 0 ] || [ -z "$APP_OBJECT_ID" ] || [ "$APP_OBJECT_ID" = "null" ]; then
            set +e
            APP_OBJECT_ID=$(az ad app list --filter "appId eq '$APP_ID'" --query "[0].id" -o tsv 2>&1)
            APP_LOOKUP_EXIT_CODE=$?
            set -e
          else
            APP_LOOKUP_EXIT_CODE=0
          fi

          if [ $APP_LOOKUP_EXIT_CODE -ne 0 ] || [ -z "$APP_OBJECT_ID" ] || [ "$APP_OBJECT_ID" = "null" ]; then
            echo "::warning::Unable to resolve app registration for appId '$APP_ID'."
            exit 0
          fi

          set +e
          CURRENT_URIS_JSON=$(az ad app show --id "$APP_OBJECT_ID" --query "web.redirectUris" -o json 2>&1)
          SHOW_EXIT_CODE=$?
          set -e

          if [ $SHOW_EXIT_CODE -ne 0 ]; then
            echo "::warning::Unable to read app registration redirect URIs for cleanup. Output: $CURRENT_URIS_JSON"
            exit 0
          fi

          mapfile -t FILTERED_URIS < <(echo "$CURRENT_URIS_JSON" | jq -r --arg remove "$CALLBACK_URI_TO_REMOVE" '.[] | select(. != $remove)')

          if [ ${#FILTERED_URIS[@]} -eq 0 ]; then
            echo "No redirect URIs remain after filtering; skipping update."
            exit 0
          fi

          set +e
          UPDATE_OUTPUT=$(az ad app update --id "$APP_OBJECT_ID" --web-redirect-uris "${FILTERED_URIS[@]}" 2>&1)
          UPDATE_EXIT_CODE=$?
          set -e
          if [ $UPDATE_EXIT_CODE -ne 0 ]; then
            echo "::warning::Unable to remove callback URI from app registration. Output: $UPDATE_OUTPUT"
            exit 0
          fi

          echo "Removed callback URI: ${CALLBACK_URI_TO_REMOVE}"

      - name: PR close summary
        shell: bash
        run: |
          {
            echo "## PR Preview Environment Closed"
            echo ""
            echo "- PR: #${PR_NUMBER}"
            echo "- Static Web App: ${{ env.STATIC_WEB_APP_NAME }}"
            if [ -n "${{ steps.preview_uri.outputs.previewUrl }}" ]; then
              echo "- Preview URL: ${{ steps.preview_uri.outputs.previewUrl }}"
              echo "- Removed callback URI: ${{ steps.preview_uri.outputs.callbackUri }}"
            else
              echo "- No SWA preview environment was found for this PR; nothing to remove from B2C."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
