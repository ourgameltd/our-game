name: PR Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
        ports:
          - 14330:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '20.x'
        
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Build solution
      working-directory: ./api
      run: dotnet build --configuration Release --no-restore
      
    - name: Run tests with coverage
      working-directory: ./api
      run: |
        dotnet test --configuration Release --no-build --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults
      
    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@cf6fe1b38ed5becc89ffe056c1f240825993be5b # 5.5.4
      with:
        reports: './api/TestResults/**/coverage.cobertura.xml'
        targetdir: './coverage-report'
        reporttypes: 'HtmlInline_AzurePipelines;MarkdownSummaryGithub;Cobertura'
        assemblyfilters: '-OurGame.Persistence'
      
    - name: Add coverage summary to build
      run: |
        echo "## Unit Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
      
    - name: Upload coverage report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      if: always()
      with:
        name: coverage-report
        path: ./coverage-report
        retention-days: 14
      
    - name: Publish API
      working-directory: ./api
      run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output
      
    - name: Install React dependencies
      working-directory: ./web
      run: npm ci
      
    - name: Build React frontend
      working-directory: ./web
      run: npm run build
