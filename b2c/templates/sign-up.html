<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account or Sign In — Our Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary:        #0284c7;
      --color-primary-hover:  #0369a1;
      --color-primary-light:  #7dd3fc;
      --color-primary-focus:  #0ea5e9;
      --color-success:        #16a34a;
      --color-success-hover:  #15803d;
      --color-bg:             #f9fafb;
      --color-card:           #ffffff;
      --color-border:         #d1d5db;
      --color-text:           #111827;
      --color-text-secondary: #4b5563;
      --color-text-muted:     #9ca3af;
      --color-label:          #374151;
      --color-placeholder:    #9ca3af;
      --color-error:          #dc2626;
      --color-error-bg:       #fef2f2;
      --color-error-border:   #fecaca;
      --shadow-card: 0 1px 3px 0 rgba(0,0,0,0.10),0 1px 2px 0 rgba(0,0,0,0.06);
      --radius: 0.5rem;
      --font: 'Inter', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:             #111827;
        --color-card:           #1f2937;
        --color-border:         #4b5563;
        --color-text:           #ffffff;
        --color-text-secondary: #9ca3af;
        --color-label:          #d1d5db;
        --color-placeholder:    #6b7280;
        --color-error:          #f87171;
        --color-error-bg:       rgba(239,68,68,0.1);
        --color-error-border:   #7f1d1d;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .page-inner {
      width: 100%;
      max-width: 28rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .page-title {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.25;
    }

    .page-title .accent { color: var(--color-primary-light); }

    .page-subtitle {
      color: var(--color-text-secondary);
      margin-top: 0.5rem;
      font-size: 0.9375rem;
    }

    .card {
      background-color: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 1.5rem;
    }

    .footer-link {
      margin-top: 1rem;
      text-align: center;
    }

    .footer-link a {
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      text-decoration: none;
    }

    .footer-link a:hover { color: var(--color-text); }

    /* ── B2C injected content ── */

    #api { font-family: var(--font); }

    #api .heading { display: none; }
    #api .intro h2 { display: none; }

    /* Attribute list — B2C renders fields as <ul><li class="AttributeName"> */
    #api .attributeList ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    #api .attributeList ul li { list-style: none; }

    /* Each attribute entry */
    #api .attrEntry {
      display: flex;
      flex-direction: column;
    }

    /* Labels */
    #api label,
    #api .attrEntry > label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-label);
      margin-bottom: 0.375rem;
    }

    /* Inputs */
    #api input[type="text"],
    #api input[type="email"],
    #api input[type="password"],
    #api input[type="tel"],
    #api .textInput {
      display: block;
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      font-family: var(--font);
      color: var(--color-text);
      background-color: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    #api input::placeholder { color: var(--color-placeholder); }

    #api input[type="text"]:focus,
    #api input[type="email"]:focus,
    #api input[type="password"]:focus,
    #api input[type="tel"]:focus {
      border-color: transparent;
      box-shadow: 0 0 0 2px var(--color-primary-focus);
    }

    /* Submit (Create Account) — green to match the React RegisterPage */
    #api #continue {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      font-weight: 500;
      font-family: var(--font);
      color: #fff;
      background-color: var(--color-success);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s;
      margin-top: 0.75rem;
    }

    #api #continue:hover { background-color: var(--color-success-hover); }

    /* Cancel / back link */
    #api #cancel {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--color-text-secondary);
      background-color: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      margin-top: 0.375rem;
    }

    #api #cancel:hover {
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    #api .buttons {
      display: flex;
      flex-direction: column;
      margin-top: 0;
    }

    /* Email verification buttons */
    #api #email_ver_but_send,
    #api #email_ver_but_verify {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      color: #fff;
      background-color: var(--color-primary);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s;
      margin-top: 0.375rem;
      width: 100%;
    }

    #api #email_ver_but_send:hover,
    #api #email_ver_but_verify:hover { background-color: var(--color-primary-hover); }

    #api #email_ver_but_resend,
    #api #email_ver_but_edit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.375rem 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--color-text-secondary);
      background-color: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s;
      margin-top: 0.25rem;
      width: 100%;
    }

    #api #email_ver_but_resend:hover,
    #api #email_ver_but_edit:hover { color: var(--color-text); }

    /* Error messages */
    #api .error,
    #api .pageLevel { font-size: 0.8125rem; color: var(--color-error); }

    #api .error.pageLevel,
    #api .pageLevel:not([aria-hidden="true"]) {
      background-color: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
    }

    #api [aria-hidden="true"] { display: none !important; }

    /* Sign-in link at the bottom */
    #api .account-footer,
    #api p#signInLink {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      text-align: center;
    }

    #api #signIn {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    #api #signIn:hover { color: var(--color-primary-hover); }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="page-inner">

      <div class="page-header">
        <div class="logo-wrap">
          <img src="./logo.svg" width="96" height="96" alt="Our Game logo" />
        </div>
        <h1 class="page-title">Join <span class="accent">Our Game</span></h1>
        <p class="page-subtitle">Create your account or sign up to get started</p>
      </div>

      <div class="card">
        <div id="api"></div>
      </div>

      <div class="footer-link">
        <a href="/">&#8592; Back to home</a>
      </div>

    </div>
  </div>
</body>
</html>
