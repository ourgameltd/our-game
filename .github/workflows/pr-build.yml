name: PR Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
        ports:
          - 14330:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Build solution
      working-directory: ./api
      run: dotnet build --configuration Release --no-restore
      
    - name: Run tests with coverage
      working-directory: ./api
      run: |
        dotnet test --configuration Release --no-build --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults
      
    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5
      with:
        reports: './api/TestResults/**/coverage.cobertura.xml'
        targetdir: './coverage-report'
        reporttypes: 'HtmlInline_AzurePipelines;MarkdownSummaryGithub;Cobertura'
      
    - name: Add coverage summary to build
      run: |
        echo "## Unit Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        cat ./coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./coverage-report
        retention-days: 14
      
    - name: Publish API
      working-directory: ./api
      run: dotnet publish OurGame.Api/OurGame.Api.csproj --configuration Release --output ../api-output
      
    - name: Install React dependencies
      working-directory: ./web
      run: npm ci
      
    - name: Build React frontend
      working-directory: ./web
      run: npm run build
