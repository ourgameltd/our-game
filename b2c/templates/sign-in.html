<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Our Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary:        #0284c7;
      --color-primary-hover:  #0369a1;
      --color-primary-light:  #7dd3fc;
      --color-primary-focus:  #0ea5e9;
      --color-success:        #16a34a;
      --color-success-hover:  #15803d;
      --color-bg:             #f9fafb;
      --color-card:           #ffffff;
      --color-border:         #d1d5db;
      --color-text:           #111827;
      --color-text-secondary: #4b5563;
      --color-text-muted:     #9ca3af;
      --color-label:          #374151;
      --color-placeholder:    #9ca3af;
      --color-error:          #dc2626;
      --color-error-bg:       #fef2f2;
      --color-error-border:   #fecaca;
      --shadow-card: 0 1px 3px 0 rgba(0,0,0,0.10),0 1px 2px 0 rgba(0,0,0,0.06);
      --radius: 0.5rem;
      --font: 'Inter', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:             #111827;
        --color-card:           #1f2937;
        --color-border:         #4b5563;
        --color-text:           #ffffff;
        --color-text-secondary: #9ca3af;
        --color-label:          #d1d5db;
        --color-placeholder:    #6b7280;
        --color-error:          #f87171;
        --color-error-bg:       rgba(239,68,68,0.1);
        --color-error-border:   #7f1d1d;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .page-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .page-inner {
      width: 100%;
      max-width: 28rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .page-title {
      font-size: 1.875rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.25;
    }

    .page-title .accent { color: var(--color-primary-light); }

    .page-subtitle {
      color: var(--color-text-secondary);
      margin-top: 0.5rem;
      font-size: 0.9375rem;
    }

    .card {
      background-color: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 1.5rem;
    }

    /* ── B2C injected content ── */

    #api { font-family: var(--font); }

    #api .heading { display: none; }
    #api .intro { display: none; }

    /* Strip all list bullets from B2C injected lists */
    #api ul, #api li { list-style: none; padding: 0; }

    /* Attribute list — B2C renders fields as <ul><li class="AttributeName"> */
    #api .attributeList ul {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    /* Attribute list — B2C renders fields as <ul><li class="AttributeName"> */
    #api #attributeList ul li {
      margin-bottom: 1.25rem;
    }

    /* Each attribute entry — gap handles label → error → input spacing */
    #api .attrEntry {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    /* Labels */
    #api label,
    #api .attrEntry > label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-label);
    }

    /* Working / loading indicator */
    #api .working { display: none; }

    /* Inputs */
    #api input[type="text"],
    #api input[type="email"],
    #api input[type="password"],
    #api input[type="tel"],
    #api .textInput {
      display: block;
      width: 100%;
      padding: 0.625rem 0.875rem;
      font-size: 0.9375rem;
      font-family: var(--font);
      color: var(--color-text);
      background-color: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    #api input::placeholder { color: var(--color-placeholder); }

    #api input[type="text"]:focus,
    #api input[type="email"]:focus,
    #api input[type="password"]:focus,
    #api input[type="tel"]:focus {
      border-color: transparent;
      box-shadow: 0 0 0 2px var(--color-primary-focus);
    }

    /* Validation — errored input */
    #api input.highlightError {
      border-color: var(--color-error);
    }

    #api input.highlightError:focus {
      border-color: transparent;
      box-shadow: 0 0 0 2px var(--color-error);
    }

    /* Validation — per-field inline error text */
    #api .error.itemLevel {
      font-size: 0.8125rem;
      color: var(--color-error);
      min-height: 0;
    }

    /* Continue (Create Account) button — green */
    #api #continue {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.625rem 1rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: var(--font);
      color: #fff;
      background-color: var(--color-success);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s;
    }

    #api #continue:hover { background-color: var(--color-success-hover); }

    #api #continue:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary-focus);
    }

    /* Cancel / back button */
    #api #cancel {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.625rem 1rem;
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--color-text-secondary);
      background-color: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    #api #cancel:hover {
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    #api .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0;
    }

    /* Space between email input and send-code button */
    #api .verificationControlContent .buttons {
      margin-top: 0.75rem;
    }

    /* Separation between fields and the main continue/cancel buttons */
    #api #attributeVerification > .buttons {
      margin-top: 1.25rem;
    }

    /* Verification code buttons — primary */
    #api #email_ver_but_send,
    #api #email_ver_but_verify,
    #api .sendCode,
    #api .verifyCode {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.625rem 1rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: var(--font);
      color: #fff;
      background-color: var(--color-primary);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s;
    }

    #api #email_ver_but_send:hover,
    #api #email_ver_but_verify:hover,
    #api .sendCode:hover,
    #api .verifyCode:hover { background-color: var(--color-primary-hover); }

    #api #email_ver_but_send:focus,
    #api #email_ver_but_verify:focus,
    #api .sendCode:focus,
    #api .verifyCode:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--color-primary-focus);
    }

    /* Verification code buttons — secondary */
    #api #email_ver_but_resend,
    #api #email_ver_but_edit,
    #api .sendNewCode,
    #api .changeClaims {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0.625rem 1rem;
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: var(--font);
      color: var(--color-text-secondary);
      background-color: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    #api #email_ver_but_resend:hover,
    #api #email_ver_but_edit:hover,
    #api .sendNewCode:hover,
    #api .changeClaims:hover {
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    /* Hide B2C help links */
    #api .helpLink { display: none; }

    /* Error messages */
    #api .error p,
    #api .pageLevel p { font-size: 0.8125rem; color: var(--color-error); }

    #api .error.pageLevel:not([aria-hidden="true"]),
    #api .pageLevel:not([aria-hidden="true"]) {
      background-color: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    #api [aria-hidden="true"] { display: none !important; }

    /* Sign-in link shown at the bottom */
    #api .account-footer,
    #api p#signInLink {
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      text-align: center;
    }

    #api #signIn {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    #api #signIn:hover { color: var(--color-primary-hover); }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <div class="page-inner">

      <div class="page-header">
        <div class="logo-wrap">
          <img src="https://ourgamestorageprod001.blob.core.windows.net/b2c-templates/logo.svg" width="96" height="96" alt="Our Game logo" />
        </div>
        <h1 class="page-title">Join <span class="accent">Our Game</span></h1>
        <p class="page-subtitle">Create your account to get started</p>
      </div>

      <div class="card">
        <div id="api" data-name="SelfAsserted"></div>
      </div>

    </div>
  </div>
</body>
</html>
