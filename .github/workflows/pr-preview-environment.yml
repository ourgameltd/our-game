name: "PR Preview Environment"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main
      - master
      - develop

permissions:
  contents: read
  pull-requests: write
  deployments: write
  statuses: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: 'rgourgame'
  STATIC_WEB_APP_NAME: 'ourgame-swa-prod'
  B2C_PROVIDER_NAME: 'btoc'
  B2C_CREDENTIALS: ${{ secrets.B2C_CREDENTIALS }}

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: live

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      working-directory: ./web
      run: npm ci

    - name: Build frontend
      working-directory: ./web
      run: npm run build

    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get Static Web App deployment token
      id: static_web_app_token
      run: |
        TOKEN=$(az staticwebapp secrets list \
          --name ${{ env.STATIC_WEB_APP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Deploy PR preview environment
      id: deploy_preview
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./web/dist"
        output_location: "."
        skip_app_build: true

    - name: Azure Login (B2C tenant)
      if: ${{ env.B2C_CREDENTIALS != '' }}
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ env.B2C_CREDENTIALS }}

    - name: Add preview callback URI to app registration
      shell: bash
      env:
        APP_ID: ${{ vars.B2C_CLIENT_ID }}
        PREVIEW_BASE_URL: ${{ steps.deploy_preview.outputs.static_web_app_url }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_REF: ${{ github.head_ref }}
      run: |
        if [ -z "$APP_ID" ]; then
          echo "Repository variable B2C_CLIENT_ID is required."
          exit 1
        fi
        
        if [ -z "$PREVIEW_BASE_URL" ]; then
          PREVIEW_HOSTNAME=$(az staticwebapp environment list \
            --name "${{ env.STATIC_WEB_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[?contains(name, '${HEAD_REF}') || contains(hostname, '-${PR_NUMBER}.')].hostname | [0]" \
            -o tsv)

          if [ -n "$PREVIEW_HOSTNAME" ]; then
            PREVIEW_BASE_URL="https://${PREVIEW_HOSTNAME}"
          fi
        fi

        if [ -z "$PREVIEW_BASE_URL" ]; then
          echo "Unable to resolve preview URL; cannot update redirect URIs."
          exit 1
        fi

        CALLBACK_URI="${PREVIEW_BASE_URL}/.auth/login/${{ env.B2C_PROVIDER_NAME }}/callback"
        echo "Using callback URI: $CALLBACK_URI"

        set +e
        CURRENT_URIS_JSON=$(az ad app show --id "$APP_ID" --query "web.redirectUris" -o json 2>&1)
        SHOW_EXIT_CODE=$?
        set -e
        if [ $SHOW_EXIT_CODE -ne 0 ]; then
          if echo "$CURRENT_URIS_JSON" | grep -qi "does not exist"; then
            echo "::warning::Unable to find app registration '$APP_ID' in the tenant used by AZURE_CREDENTIALS. Ensure B2C_CLIENT_ID is the Application (client) ID of the B2C app registration in that same tenant. Azure CLI error: $CURRENT_URIS_JSON"
          else
            echo "::warning::Unable to read app registration redirect URIs. Grant the AZURE_CREDENTIALS service principal Microsoft Graph app role Application.ReadWrite.All (admin consent) and a directory role such as Application Administrator or Cloud Application Administrator. Azure CLI error: $CURRENT_URIS_JSON"
          fi
          echo "## PR Preview Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Preview URL: ${PREVIEW_BASE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- Callback URI update skipped because the app registration could not be read." >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        mapfile -t CURRENT_URIS < <(echo "$CURRENT_URIS_JSON" | jq -r '.[]?')
        CURRENT_URIS+=("$CALLBACK_URI")
        mapfile -t UNIQUE_URIS < <(printf "%s\n" "${CURRENT_URIS[@]}" | awk 'NF && !seen[$0]++')

        set +e
        UPDATE_OUTPUT=$(az ad app update --id "$APP_ID" --web-redirect-uris "${UNIQUE_URIS[@]}" 2>&1)
        UPDATE_EXIT_CODE=$?
        set -e
        if [ $UPDATE_EXIT_CODE -ne 0 ]; then
          echo "::warning::Unable to update app registration redirect URIs. Grant the AZURE_CREDENTIALS service principal Microsoft Graph app role Application.ReadWrite.All (admin consent) and a directory role such as Application Administrator or Cloud Application Administrator. Azure CLI error: $UPDATE_OUTPUT"
          echo "## PR Preview Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Preview URL: ${PREVIEW_BASE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- Callback URI update skipped due to missing Microsoft Graph permissions." >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        echo "## PR Preview Environment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
        echo "- Preview URL: ${PREVIEW_BASE_URL}" >> $GITHUB_STEP_SUMMARY
        echo "- Added callback URI: ${CALLBACK_URI}" >> $GITHUB_STEP_SUMMARY

  close-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: live

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get Static Web App deployment token
      id: static_web_app_token
      run: |
        TOKEN=$(az staticwebapp secrets list \
          --name ${{ env.STATIC_WEB_APP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Resolve current preview callback URI
      id: preview_uri
      shell: bash
      run: |
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PREVIEW_HOSTNAME=$(az staticwebapp environment list \
          --name "${{ env.STATIC_WEB_APP_NAME }}" \
          --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
          --query "[?contains(name, '${{ github.head_ref }}') || contains(hostname, '-${PR_NUMBER}.')].hostname | [0]" \
          -o tsv)

        if [ -n "$PREVIEW_HOSTNAME" ]; then
          echo "callbackUri=https://${PREVIEW_HOSTNAME}/.auth/login/${{ env.B2C_PROVIDER_NAME }}/callback" >> $GITHUB_OUTPUT
          echo "previewUrl=https://${PREVIEW_HOSTNAME}" >> $GITHUB_OUTPUT
        fi

    - name: Close PR preview environment
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "close"

    - name: Azure Login (B2C tenant)
      if: ${{ env.B2C_CREDENTIALS != '' }}
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        creds: ${{ env.B2C_CREDENTIALS }}

    - name: Remove preview callback URI from app registration
      if: steps.preview_uri.outputs.callbackUri != ''
      shell: bash
      env:
        APP_ID: ${{ vars.B2C_CLIENT_ID }}
        CALLBACK_URI_TO_REMOVE: ${{ steps.preview_uri.outputs.callbackUri }}
      run: |
        if [ -z "$APP_ID" ]; then
          echo "Repository variable B2C_CLIENT_ID is required."
          exit 1
        fi

        set +e
        CURRENT_URIS_JSON=$(az ad app show --id "$APP_ID" --query "web.redirectUris" -o json 2>&1)
        SHOW_EXIT_CODE=$?
        set -e
        
        if [ $SHOW_EXIT_CODE -ne 0 ]; then
          if echo "$CURRENT_URIS_JSON" | grep -qi "does not exist"; then
            echo "::warning::Unable to find app registration '$APP_ID' in the tenant used by AZURE_CREDENTIALS. Ensure B2C_CLIENT_ID is the Application (client) ID of the B2C app registration in that same tenant. Azure CLI error: $CURRENT_URIS_JSON"
          else
            echo "::warning::Unable to read app registration redirect URIs for cleanup. Grant the AZURE_CREDENTIALS service principal Microsoft Graph app role Application.ReadWrite.All (admin consent) and a directory role such as Application Administrator or Cloud Application Administrator. Azure CLI error: $CURRENT_URIS_JSON"
          fi
          echo "## PR Preview Environment Closed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Preview URL: ${{ steps.preview_uri.outputs.previewUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- Callback URI cleanup skipped because the app registration could not be read." >> $GITHUB_STEP_SUMMARY
          exit 0
        fi
        mapfile -t FILTERED_URIS < <(echo "$CURRENT_URIS_JSON" | jq -r --arg remove "$CALLBACK_URI_TO_REMOVE" '.[] | select(. != $remove)')

        if [ ${#FILTERED_URIS[@]} -eq 0 ]; then
          echo "No redirect URIs remain after filtering; skipping update."
          exit 0
        fi

        set +e
        UPDATE_OUTPUT=$(az ad app update --id "$APP_ID" --web-redirect-uris "${FILTERED_URIS[@]}" 2>&1)
        UPDATE_EXIT_CODE=$?
        set -e
        if [ $UPDATE_EXIT_CODE -ne 0 ]; then
          echo "::warning::Unable to remove callback URI from app registration. Grant the AZURE_CREDENTIALS service principal Microsoft Graph app role Application.ReadWrite.All (admin consent) and a directory role such as Application Administrator or Cloud Application Administrator. Azure CLI error: $UPDATE_OUTPUT"
          echo "## PR Preview Environment Closed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Preview URL: ${{ steps.preview_uri.outputs.previewUrl }}" >> $GITHUB_STEP_SUMMARY
          echo "- Callback URI cleanup skipped due to missing Microsoft Graph permissions." >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        echo "## PR Preview Environment Closed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
        echo "- Preview URL: ${{ steps.preview_uri.outputs.previewUrl }}" >> $GITHUB_STEP_SUMMARY
        echo "- Removed callback URI: ${CALLBACK_URI_TO_REMOVE}" >> $GITHUB_STEP_SUMMARY
