services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose --skipApiVersionCheck"
    volumes:
      - azurite_data:/data
    restart: unless-stopped

  seeder:
    build:
      context: ./api
      dockerfile: OurGame.Seeder/Dockerfile
    profiles:
      - seed
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=OurGame;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver
    restart: "no"

volumes:
  sqlserver_data:
  azurite_data:
