name: Deploy Static Web App

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'
  AZURE_RESOURCE_GROUP: 'rgourgame'
  STATIC_WEB_APP_NAME: 'ourgame-swa-prod'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: live

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install dependencies
      working-directory: ./web
      run: npm ci

    - name: Build frontend
      working-directory: ./web
      run: npm run build

    - name: Azure Login
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get Static Web App deployment token
      id: static_web_app_token
      run: |
        TOKEN=$(az staticwebapp secrets list \
          --name ${{ env.STATIC_WEB_APP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static_web_app_token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./web/dist"
        output_location: "."
        skip_app_build: true

    - name: Deployment Summary
      run: |
        echo "## Static Web App Deployed! 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Static Web App**: ${{ env.STATIC_WEB_APP_NAME }}" >> $GITHUB_STEP_SUMMARY
