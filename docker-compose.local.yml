services:
  api:
    build:
      context: ./api
      dockerfile: OurGame.Api/Dockerfile
    platform: linux/amd64
    environment:
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated
      AzureWebJobsStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=OurGame;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    ports:
      - "7071:80"
    depends_on:
      - sqlserver
      - azurite
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "14330:1433"
    volumes:
      - ./.sqldata:/var/opt/mssql
    restart: unless-stopped

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    volumes:
      - ./.azurite:/data
    restart: unless-stopped

  seeder:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    profiles:
      - seed
    working_dir: /workspace/api
    volumes:
      - ./api:/workspace/api
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=OurGame;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True"
    depends_on:
      - sqlserver
    command: ["dotnet", "run", "--project", "OurGame.Seeder"]
    restart: "no"
