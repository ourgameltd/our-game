name: Stryker Mutation Testing

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  mutate-application:
    name: Mutate OurGame.Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: '8.0.x'
      
    - name: Install Stryker.NET
      run: dotnet tool install --global dotnet-stryker
      
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Run Stryker on Application layer
      working-directory: ./api/OurGame.Application.Tests
      run: |
        dotnet stryker \
          --config-file ../stryker-config.json \
          --project OurGame.Application.csproj \
          --output ../StrykerOutput/Application
      
    - name: Add mutation summary to build
      if: always()
      run: |
        echo "## Stryker Mutation Testing — OurGame.Application" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f ./api/StrykerOutput/Application/reports/mutation-report.md ]; then
          cat ./api/StrykerOutput/Application/reports/mutation-report.md >> $GITHUB_STEP_SUMMARY
        else
          echo "Mutation report not generated. Check logs for details." >> $GITHUB_STEP_SUMMARY
        fi
      
    - name: Upload Application mutation report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: stryker-report-application
        path: ./api/StrykerOutput/Application
        retention-days: 14

  mutate-api:
    name: Mutate OurGame.Api
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: '8.0.x'
      
    - name: Install Stryker.NET
      run: dotnet tool install --global dotnet-stryker
      
    - name: Restore dependencies
      working-directory: ./api
      run: dotnet restore
      
    - name: Run Stryker on Api layer
      working-directory: ./api/OurGame.Api.Tests
      run: |
        dotnet stryker \
          --config-file ../stryker-config.json \
          --project OurGame.Api.csproj \
          --output ../StrykerOutput/Api
      
    - name: Add mutation summary to build
      if: always()
      run: |
        echo "## Stryker Mutation Testing — OurGame.Api" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f ./api/StrykerOutput/Api/reports/mutation-report.md ]; then
          cat ./api/StrykerOutput/Api/reports/mutation-report.md >> $GITHUB_STEP_SUMMARY
        else
          echo "Mutation report not generated. Check logs for details." >> $GITHUB_STEP_SUMMARY
        fi
      
    - name: Upload Api mutation report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: stryker-report-api
        path: ./api/StrykerOutput/Api
        retention-days: 14
